name: Build Kernels

permissions:
  contents: write
  actions: write

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Type"
        type: choice
        options: [ Actions, Pre-Release, Release ]
        default: Actions
      ksu_variant:
        description: "KernelSU Variant"
        type: choice
        options: [ KSU, WKSU, Next, RKSU]
        default: WKSU
      ksu_commit:
        description: "KSU Commit (optional)"
        type: string
        default: ""
        required: false
      build_bypass:
        description: "Build Bypass Only (when true, only bypass variant is built; when false, both bypass and normal are built)"
        type: boolean
        default: true
      # Build Selection
      build_list:
        description: "Build List (comma-separated, e.g., 'a14-6.1.124,a15-6.6,custom,lts' or 'all' for everything)"
        type: string
        default: "all"
        required: false

jobs:
  generate-matrix:
    name: Generate Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.filter.outputs.matrix }}
      count: ${{ steps.filter.outputs.count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Run filter script
        id: filter
        run: |
          chmod +x .github/workflows/scripts/filter.sh
          .github/workflows/scripts/filter.sh "${{ inputs.build_list }}" ".github/workflows/versions"
      
      - name: Display matrix
        run: |
          echo "Build matrix generated:"
          echo '${{ steps.filter.outputs.matrix }}' | jq '.'
          echo "Total builds: ${{ steps.filter.outputs.count }}"

  build-a12-5-10:
    name: "Android 12 - Kernel 5.10"
    needs: generate-matrix
    if: contains(needs.generate-matrix.outputs.matrix, '"android_version":"android12"') && contains(needs.generate-matrix.outputs.matrix, '"kernel_version":"5.10"')
    uses: ./.github/workflows/kernel-a12-5-10.yml
    secrets: inherit
    with:
      ksu_variant: ${{ inputs.ksu_variant }}
      ksu_commit: ${{ inputs.ksu_commit }}
      build_bypass: ${{ inputs.build_bypass }}
      build_list: ${{ inputs.build_list }}

  build-a13-5-10:
    name: "Android 13 - Kernel 5.10"
    needs: generate-matrix
    if: contains(needs.generate-matrix.outputs.matrix, '"android_version":"android13"') && contains(needs.generate-matrix.outputs.matrix, '"kernel_version":"5.10"')
    uses: ./.github/workflows/kernel-a13-5-10.yml
    secrets: inherit
    with:
      ksu_variant: ${{ inputs.ksu_variant }}
      ksu_commit: ${{ inputs.ksu_commit }}
      build_bypass: ${{ inputs.build_bypass }}
      build_list: ${{ inputs.build_list }}

  build-a13-5-15:
    name: "Android 13 - Kernel 5.15"
    needs: generate-matrix
    if: contains(needs.generate-matrix.outputs.matrix, '"android_version":"android13"') && contains(needs.generate-matrix.outputs.matrix, '"kernel_version":"5.15"')
    uses: ./.github/workflows/kernel-a13-5-15.yml
    secrets: inherit
    with:
      ksu_variant: ${{ inputs.ksu_variant }}
      ksu_commit: ${{ inputs.ksu_commit }}
      build_bypass: ${{ inputs.build_bypass }}
      build_list: ${{ inputs.build_list }}

  build-a14-5-15:
    name: "Android 14 - Kernel 5.15"
    needs: generate-matrix
    if: contains(needs.generate-matrix.outputs.matrix, '"android_version":"android14"') && contains(needs.generate-matrix.outputs.matrix, '"kernel_version":"5.15"')
    uses: ./.github/workflows/kernel-a14-5-15.yml
    secrets: inherit
    with:
      ksu_variant: ${{ inputs.ksu_variant }}
      ksu_commit: ${{ inputs.ksu_commit }}
      build_bypass: ${{ inputs.build_bypass }}
      build_list: ${{ inputs.build_list }}

  build-a14-6-1:
    name: "Android 14 - Kernel 6.1"
    needs: generate-matrix
    if: contains(needs.generate-matrix.outputs.matrix, '"android_version":"android14"') && contains(needs.generate-matrix.outputs.matrix, '"kernel_version":"6.1"')
    uses: ./.github/workflows/kernel-a14-6-1.yml
    secrets: inherit
    with:
      ksu_variant: ${{ inputs.ksu_variant }}
      ksu_commit: ${{ inputs.ksu_commit }}
      build_bypass: ${{ inputs.build_bypass }}
      build_list: ${{ inputs.build_list }}

  build-a15-6-6:
    name: "Android 15 - Kernel 6.6"
    needs: generate-matrix
    if: contains(needs.generate-matrix.outputs.matrix, '"android_version":"android15"') && contains(needs.generate-matrix.outputs.matrix, '"kernel_version":"6.6"')
    uses: ./.github/workflows/kernel-a15-6-6.yml
    secrets: inherit
    with:
      ksu_variant: ${{ inputs.ksu_variant }}
      ksu_commit: ${{ inputs.ksu_commit }}
      build_bypass: ${{ inputs.build_bypass }}
      build_list: ${{ inputs.build_list }}

  build-a16-6-12:
    name: "Android 16 - Kernel 6.12"
    needs: generate-matrix
    if: contains(needs.generate-matrix.outputs.matrix, '"android_version":"android16"') && contains(needs.generate-matrix.outputs.matrix, '"kernel_version":"6.12"')
    uses: ./.github/workflows/kernel-a16-612.yml
    secrets: inherit
    with:
      ksu_variant: ${{ inputs.ksu_variant }}
      ksu_commit: ${{ inputs.ksu_commit }}
      build_bypass: ${{ inputs.build_bypass }}
      build_list: ${{ inputs.build_list }}

  build-lts:
    name: "LTS Kernels"
    needs: generate-matrix
    if: contains(needs.generate-matrix.outputs.matrix, '"sub_level":"X"')
    uses: ./.github/workflows/kernel-lts.yml
    secrets: inherit
    with:
      ksu_variant: ${{ inputs.ksu_variant }}
      ksu_commit: ${{ inputs.ksu_commit }}
      build_bypass: ${{ inputs.build_bypass }}
      build_list: ${{ inputs.build_list }}

  build-custom:
    name: "Custom Kernels"
    needs: generate-matrix
    if: contains(inputs.build_list, 'all') || contains(inputs.build_list, 'custom')
    uses: ./.github/workflows/kernel-custom.yml
    secrets: inherit
    with:
      ksu_variant: ${{ inputs.ksu_variant }}
      ksu_commit: ${{ inputs.ksu_commit }}
      build_bypass: ${{ inputs.build_bypass }}
      build_list: ${{ inputs.build_list }}

  rej:
    if: always()
    runs-on: ubuntu-latest
    needs:
    - build-a12-5-10
    - build-a13-5-10
    - build-a13-5-15
    - build-a14-5-15
    - build-a14-6-1
    - build-a15-6-6
    - build-a16-6-12
    - build-lts
    - build-custom
    steps:
    - name: Download Misc Artifacts
      uses: actions/download-artifact@v5
      with:
        path: ./downloaded-artifacts
        pattern: '*-Rejects'

    - name: Process Reject Artifacts
      run: |
        mkdir -p aio-rejects
        
        # Iterate over Rejects artifacts in downloaded-artifacts
        for dir in ./downloaded-artifacts/*-Rejects; do
            # Ensure it is a directory
            [ -d "$dir" ] || continue
            
            dirname=$(basename "$dir")
            echo "Processing $dirname..."
            
            # Get original name (remove -Rejects suffix)
            original_name=${dirname%-Rejects}
            
            mkdir -p "aio-rejects/$original_name"
            
            # Check for patch-rejects folder (legacy structure) or direct contents
            if [ -d "$dir/patch-rejects" ]; then
                echo "Found patch-rejects subdir in $dirname"
                cp -r "$dir/patch-rejects/." "aio-rejects/$original_name/"
            else
                echo "Copying contents from $dirname"
                cp -r "$dir/." "aio-rejects/$original_name/"
            fi
        done
        
        # Zip and upload if we found anything
        if [ "$(ls -A aio-rejects)" ]; then
            echo "Creating AIO-REJ.zip..."
            cd aio-rejects
            zip -r -q -9 ../AIO-REJ.zip .
            cd ..
        else
            echo "No rejects found. Skipping zip creation."
        fi

    - name: Upload AIO Rejects
      if: hashFiles('AIO-REJ.zip') != ''
      uses: actions/upload-artifact@v5
      with:
        name: AIO-Rejects
        path: AIO-REJ.zip
        compression-level: 0

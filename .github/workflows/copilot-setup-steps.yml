name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Shallow checkout Android14 6.1 kernel source
        run: |
          git clone https://android.googlesource.com/kernel/common \
            -b deprecated/android14-6.1-2025-02 \
            --depth=1 \
            "$RUNNER_TEMP/kernel-common"

      - name: Apply containerd (ctr) patches
        run: |
          set -euo pipefail

          KERNEL_SRC_DIR="$RUNNER_TEMP/kernel-common"
          PATCH_DIR="$GITHUB_WORKSPACE/ctr_patches/a14-6.1"

          test -d "$KERNEL_SRC_DIR"
          test -d "$PATCH_DIR"

          cd "$KERNEL_SRC_DIR"
          mapfile -t patch_files < <(find "$PATCH_DIR" -type f -name "*.patch" | sort)

          for patch_file in "${patch_files[@]}"; do
            echo "Applying $patch_file"
            patch -p1 --fuzz=0 < "$patch_file"
          done
